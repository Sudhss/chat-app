version: '3.9'

services:
  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: flux_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     flux_user
      POSTGRES_PASSWORD: flux_pass
      POSTGRES_DB:       flux_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flux_user -d flux_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: flux_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible storage) ─────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: flux_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── MinIO bucket setup ────────────────────────────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: flux_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/flux-media;
      mc anonymous set download local/flux-media;
      echo 'MinIO bucket ready';
      "
    restart: on-failure

  # ── Backend ──────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: flux_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV:              production
      PORT:                  4000
      DATABASE_URL:          postgresql://flux_user:flux_pass@postgres:5432/flux_db
      REDIS_URL:             redis://redis:6379
      JWT_ACCESS_SECRET:     ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET:    ${JWT_REFRESH_SECRET}
      COOKIE_SECRET:         ${COOKIE_SECRET}
      CLIENT_URL:            ${CLIENT_URL:-http://localhost:3000}
      AWS_REGION:            us-east-1
      AWS_ACCESS_KEY_ID:     minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME:        flux-media
      S3_ENDPOINT:           http://minio:9000
      BCRYPT_ROUNDS:         12
      MAX_FILE_SIZE_MB:      25
    ports:
      - "4000:4000"
    volumes:
      - ./backend/.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: flux_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL:    http://localhost:4000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    ports:
      - "3000:3000"

  # ── Nginx ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: flux_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  minio_data:
